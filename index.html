<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Treeverse Slot MVP</title>
<script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=9u34_98eDcrlrphRenOWUsEmu3sSDTp0dkKWOwT0cRbUHXATpVgHJzwq15vsJ9XKtIbWZhpaM2TDERr8JMPxVtFkUyiXSeuk_gC2kEthtM82CIThJyiLyWozICDpB-Oo2AjKjRTy9QaPKAWYVXk3UP3YeAaJKXG4NlzwwO08Xk30-ThR28eOT8RJ_2pjUPaICRKc3T_jZVDbstZHT6u3uhXgdI216fFaXSvk86X_YvEjHiGnnROP1qjmmm4-KvK6QeQfvlO_yrydfz3efKSURw" charset="UTF-8"></script><script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{background:#0a0f1c;color:white;font-family:Arial;text-align:center}
.grid{display:grid;grid-template-columns:repeat(5,80px);gap:8px;justify-content:center;margin:20px}
.cell{width:80px;height:80px;background:#1c2333;display:flex;align-items:center;justify-content:center;border-radius:8px}
button{padding:10px 20px;font-size:16px;margin:5px;cursor:pointer}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center}
.modal-inner{background:#111;padding:20px;border-radius:10px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const SYMBOLS = ["leaf","wood","stone","sap","relic","blade","beast","guardian","wild","scatter"]

function getRandom(){return SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)]}

function generate(){
  return Array.from({length:3},()=>Array.from({length:5},()=>getRandom()))
}

function App(){
  const [grid,setGrid]=React.useState(generate())
  const [balance,setBalance]=React.useState(10000)
  const [bet,setBet]=React.useState(50)
  const [spinning,setSpinning]=React.useState(false)
  const [auto,setAuto]=React.useState({active:false,remaining:0})
  const [open,setOpen]=React.useState(false)
  const [custom,setCustom]=React.useState("")

  const spin=()=>{
    if(spinning) return
    setSpinning(true)
    setTimeout(()=>{
      setGrid(generate())
      setBalance(b=>b-bet+Math.floor(Math.random()*100))
      setSpinning(false)
    },500)
  }

  React.useEffect(()=>{
    if(!auto.active || spinning) return
    if(auto.remaining<=0){
      setAuto({active:false,remaining:0})
      return
    }
    const t=setTimeout(()=>{
      spin()
      setAuto(a=>({...a,remaining:a.remaining-1}))
    },600)
    return ()=>clearTimeout(t)
  },[auto,spinning])

  const startAuto=(spins)=>{
    if(!spins || spins<=0) return
    setAuto({active:true,remaining:spins})
    setOpen(false)
  }

  return(
    <div>
      <h1>Treeverse Slot</h1>
      <p>Balance: {balance}</p>
      <p>Bet: {bet}</p>

      <div className="grid">
        {grid.map((row,r)=>row.map((c,i)=>(
          <div key={r+i} className="cell">{c}</div>
        )))}
      </div>

      <button onClick={spin}>{spinning?"...":"Spin"}</button>
      <button onClick={()=>setOpen(true)}>Auto Play</button>

      {auto.active && <p>Auto Spins Left: {auto.remaining}</p>}

      {open && (
        <div className="modal">
          <div className="modal-inner">
            <h3>Select Spins</h3>
            {[10,20,50,100].map(n=>(
              <button key={n} onClick={()=>startAuto(n)}>{n}</button>
            ))}
            <div>
              <input value={custom} onChange={e=>setCustom(e.target.value)} placeholder="Custom spins"/>
              <button onClick={()=>startAuto(parseInt(custom)||0)}>Start</button>
            </div>
            <button onClick={()=>setOpen(false)}>Close</button>
          </div>
        </div>
      )}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)
</script>
</body>
</html>
